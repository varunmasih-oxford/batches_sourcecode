<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box</title>
    <style>
        *{
            /* margin: 0; */
            padding: 0;
        }
        .main{
            height: 500px;
            width: 100%;
            background-color: grey;
            display: flex;
            /* flex-direction: row; */
            /* flex-direction: column; */
            /* flex-direction: row-reverse; */
            /* flex-direction: column-reverse; */

            /* align-items: start; */
            /* align-items: center; */
            /* align-items: end; */

            /* justify-content: center; */
            /* justify-content: end; */
            /* justify-content: space-between; */
            /* justify-content: space-around; */
            justify-content: space-evenly;
        }
        .box{
            height: 100px;
            width: 100px;
        }
        .color_yellow{
            background-color: yellow;
        }
        .color_red{
            background-color: red;
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="box color_yellow">1</div>
        <div class="box color_red">2</div>
        <div class="box color_yellow">3</div>
        <div class="box color_red">4</div>
        <div class="box color_yellow">5</div>
