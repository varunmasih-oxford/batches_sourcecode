<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout</title>
    <style>
        #main{
            height: 1000px;        
            width: 100%;
            background-color: red;
        }
        #header{
            height: 100px;        
            width: 100%;
            background-color: blue;
        }
        #center{
            height: 800px;        
            width: 100%;
            background-color: tomato;
        }
        #footer{
            height: 100px;        
            width: 100%;
            background-color: black;
        }
    </style>
</head>
<body>
    <div id="main">
        <div id="header"></div>
        <div id="center"></div>
        <div id="footer"></div>
    </div>
</body>
</html>
