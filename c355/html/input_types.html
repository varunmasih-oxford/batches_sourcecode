<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
                    
        <label for="student_name">User name</label>
        <input type="text" name="student_name" >
        <br>
                    
        <label for="student_name">number</label>
        <input type="number" name="student_name" >
        <br>
                    
        <label for="student_name">email</label>
        <input type="email" name="student_name" >
        <br>
                    
        <label for="student_name">password</label>
        <input type="password" name="student_name" >
        <br>
                    
        <label for="student_name">date</label>
        <input type="date" name="student_name" >
        <br>
                    
        <label for="student_name">time</label>
        <input type="time" name="student_name" >
        <br>
                    
        <label for="student_name">datetime-local</label>
        <input type="datetime-local" name="student_name">
        <br>
                    
        <label for="student_name">choose subject</label>
        
        <input type="checkbox" name="student_name">
        <label for="student_name">Maths</label>

        <input type="checkbox" name="student_name">
        <label for="student_name">English</label>

        <br>
                    
        <label for="student_name">choose One subject</label>
        
        <input type="radio" name="student_name">
        <label for="student_name">Maths</label>
        
        <input type="radio" name="student_name">
        <label for="student_name">English</label>
        
        <br>
        
        <label for="student_name">choose Color</label>
        <input type="color" name="student_name">
        <br>

        
        <label for="student_name">choose File</label>
        <input type="file" name="student_name">
        <br>

        <input type="submit" value="send">

    </form>
</body>
</html>
